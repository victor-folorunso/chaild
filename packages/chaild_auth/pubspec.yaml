name: chaild_auth
description: "Chaild Auth — drop-in auth, subscriptions & affiliate SDK for Flutter."
version: 0.0.1
publish_to: 'none' # remove when ready to publish to pub.dev

environment:
  sdk: ^3.6.0
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter

  # Auth & backend
  supabase_flutter: ^2.8.0
  sign_in_with_apple: ^6.1.4
  google_sign_in: ^6.2.2

  # Subscriptions
  purchases_flutter: ^8.0.0

  # State management
  flutter_riverpod: ^2.6.1

  # Payments / browser
  url_launcher: ^6.3.1

  # Secure token storage
  flutter_secure_storage: ^9.2.4

  # UI
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
